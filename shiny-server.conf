# Shiny Server configuration
# Docs: https://docs.posit.co/shiny-server/

run_as shiny;

server {
  listen 3838;

  location /suhii {
    app_dir /srv/shiny-server/suhii/shiny;

    # Increase timeouts for long-running analyses
    app_init_timeout  300;
    app_idle_timeout  600;

    log_dir /var/log/shiny-server;
  }

  # Redirect root to app
  location / {
    redirect /suhii;
  }
}
